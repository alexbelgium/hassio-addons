arch:
  - aarch64
  - amd64
audio: true
description: Claude Desktop streamed through a browser with LinuxServer Selkies
devices:
  - /dev/dri
  - /dev/dri/card0
  - /dev/dri/card1
  - /dev/dri/renderD128
  - /dev/fuse
environment:
  AUTO_GPU: "1"
  FM_HOME: /config/data
  HOME: /config/data
  PGID: "0"
  PUID: "0"
  SELKIES_FRAMERATE: "30"
  START_DOCKER: "false"
  TITLE: Claude Desktop
  shm_size: 1gb
image: ghcr.io/alexbelgium/claude_desktop-{arch}
ingress: true
init: false
map:
  - addon_config:rw
  - share:rw
  - media:rw
  - ssl
name: Claude Desktop
options:
  env_vars: []
  DNS_server: 8.8.8.8
  PGID: 0
  PUID: 0
  additional_apps: ""
  additional_pip: ""
  auto_update: true
  data_location: /config/data
  install_caveman: true
  install_headroom: true
  install_rtk: true
panel_admin: false
panel_icon: mdi:robot-happy
ports:
  3000/tcp: null
  3001/tcp: null
ports_description:
  3000/tcp: Web interface
  3001/tcp: Web interface https
privileged:
  - SYS_ADMIN
  - DAC_READ_SEARCH
schema:
  env_vars:
    - name: match(^[A-Za-z0-9_]+$)
      value: str?
  DNS_server: str?
  DRINODE: list(/dev/dri/card0|/dev/dri/card1|/dev/dri/card2|/dev/dri/renderD128|/dev/dri/renderD129|)?
  KEYBOARD: list(da-dk-qwerty|de-de-qwertz|en-gb-qwerty|en-us-qwerty|es-es-qwerty|fr-ch-qwertz|fr-fr-azerty|it-it-qwerty|ja-jp-qwerty|pt-br-qwerty|sv-se-qwerty|tr-tr-qwerty)?
  PASSWORD: str?
  PGID: int
  PUID: int
  TZ: match([A-Z][a-z]*./[A-Z][a-z]*.)?
  additional_apps: str?
  additional_pip: str?
  auto_update: bool?
  install_caveman: bool
  install_headroom: bool
  install_rtk: bool
slug: claude_desktop
tmpfs: true
udev: true
url: https://github.com/alexbelgium/hassio-addons
version: "1.0"
video: true
