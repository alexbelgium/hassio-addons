arch:
  - aarch64
  - amd64
audio: true
description: Claude Desktop and a persistent Claude Code terminal streamed from one add-on
devices:
  - /dev/dri
  - /dev/dri/card0
  - /dev/dri/card1
  - /dev/dri/renderD128
  - /dev/fuse
environment:
  AUTO_GPU: "1"
  FM_HOME: /data/data
  HOME: /data/data
  PGID: "0"
  PUID: "0"
  SELKIES_FRAMERATE: "30"
  START_DOCKER: "false"
  TITLE: Claude Desktop
image: ghcr.io/alexbelgium/claude_desktop-{arch}
ingress: true
init: false
hassio_api: true
hassio_role: manager
homeassistant_api: true
auth_api: true
map:
  - addon_config:rw
  - share:rw
  - media:rw
  - ssl
name: Claude Desktop
options:
  env_vars: []
  DNS_server: 8.8.8.8
  data_location: /data/data
  PGID: 0
  PUID: 0
  additional_apps: ""
  additional_pip: ""
  auto_update: true
  github_email: ""
  ha_smart_context: true
  enable_ha_mcp: true
  dangerously_skip_permissions: false
  enable_terminal: true
  terminal_username: claude
  terminal_password: ""
  terminal_workspace: ""
  github_token: ""
  github_username: ""
  install_caveman: true
  install_github_cli: true
  install_headroom: true
  install_rtk: true
panel_admin: false
panel_icon: mdi:robot-happy
ports:
  3001/tcp: null
  7681/tcp: null
  8787/tcp: 8787
ports_description:
  3001/tcp: Claude Desktop web interface
  7681/tcp: HTTP Basic-auth Claude Code terminal (no TLS)
  8787/tcp: Headroom dashboard and proxy
privileged:
  - SYS_ADMIN
  - DAC_READ_SEARCH
schema:
  env_vars:
    - name: match(^[A-Za-z0-9_]+$)
      value: str?
  DNS_server: str?
  data_location: str?
  DRINODE: list(/dev/dri/card0|/dev/dri/card1|/dev/dri/card2|/dev/dri/renderD128|/dev/dri/renderD129|)?
  KEYBOARD: list(da-dk-qwerty|de-de-qwertz|en-gb-qwerty|en-us-qwerty|es-es-qwerty|fr-ch-qwertz|fr-fr-azerty|it-it-qwerty|ja-jp-qwerty|pt-br-qwerty|sv-se-qwerty|tr-tr-qwerty)?
  PASSWORD: str?
  PGID: int
  PUID: int
  TZ: match([A-Z][a-z]*./[A-Z][a-z]*.)?
  additional_apps: str?
  additional_pip: str?
  auto_update: bool?
  github_email: str?
  ha_smart_context: bool?
  enable_ha_mcp: bool?
  dangerously_skip_permissions: bool?
  enable_terminal: bool?
  terminal_username: match(^[A-Za-z0-9_.-]+$)?
  terminal_password: password?
  terminal_workspace: str?
  github_token: password?
  github_username: str?
  install_caveman: bool
  install_github_cli: bool
  install_headroom: bool
  install_rtk: bool
slug: claude_desktop
tmpfs: true
udev: true
url: https://github.com/alexbelgium/hassio-addons
version: "1.13"
video: true
