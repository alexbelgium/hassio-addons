arch:
  - aarch64
  - amd64
description: "Persistent OpenAI Codex web terminal optimized with Headroom and RTK"
devices:
  - /dev/fuse
environment:
  HOME: /data/data
  PGID: "0"
  PUID: "0"
  TERM: xterm-256color
image: ghcr.io/alexbelgium/chatgpt_codex-{arch}
ingress: true
ingress_port: 7681
ingress_stream: true
init: false
map:
  - addon_config:rw
  - share:rw
  - media:rw
  - ssl
name: ChatGPT Codex
options:
  env_vars: []
  DNS_server: 8.8.8.8
  data_location: /data/data
  workspace: /data/data/workspace
  PUID: 0
  PGID: 0
  auto_start_codex: true
  use_headroom: true
  headroom_output_shaper: true
  headroom_code_aware: true
  github_token: ""
  github_username: ""
  github_email: ""
  additional_apps: ""
  additional_pip: ""
panel_admin: true
panel_icon: mdi:code-braces-box
privileged:
  - SYS_ADMIN
  - DAC_READ_SEARCH
schema:
  env_vars:
    - name: match(^[A-Za-z0-9_]+$)
      value: str?
  DNS_server: str?
  data_location: str?
  workspace: str?
  PUID: int
  PGID: int
  TZ: match([A-Z][a-z]*./[A-Z][a-z]*.)?
  auto_start_codex: bool
  use_headroom: bool
  headroom_output_shaper: bool
  headroom_code_aware: bool
  github_token: password?
  github_username: str?
  github_email: str?
  additional_apps: str?
  additional_pip: str?
  localdisks: str?
  networkdisks: str?
slug: chatgpt_codex
tmpfs: true
udev: true
url: https://github.com/alexbelgium/hassio-addons
version: "0.1.0"
