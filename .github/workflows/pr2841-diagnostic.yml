---
name: PR 2841 Build Diagnostic

on:
  pull_request:
    branches:
      - master

jobs:
  diagnose:
    if: ${{ github.event.pull_request.number == 2841 }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Gather add-on information
        id: information
        uses: frenck/action-addon-information@v1.4
        with:
          path: ./claude_desktop/

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build amd64 and capture tail
        shell: bash
        run: |
          set +e
          BUILD_FROM="$(jq -r '.build_from.amd64 // empty' '${{ steps.information.outputs.build }}')"
          docker buildx build \
            --platform linux/amd64 \
            --progress=plain \
            --build-arg "BUILD_FROM=${BUILD_FROM}" \
            --file claude_desktop/Dockerfile \
            claude_desktop >build.log 2>&1
          status=$?
          tail -n 300 build.log >build-tail.log
          printf 'build_status=%s\n' "$status" >build-status.txt
          exit 0

      - name: Upload diagnostic log
        uses: actions/upload-artifact@v4
        with:
          name: pr2841-amd64-build-log
          path: |
            build-tail.log
            build-status.txt
          retention-days: 1
