---
name: PR 2841 Build Diagnostic

on:
  pull_request:
    branches:
      - master

jobs:
  diagnose:
    if: ${{ github.event.pull_request.number == 2841 }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Gather add-on information
        id: information
        uses: frenck/action-addon-information@v1.4
        with:
          path: ./claude_desktop/

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Inspect context and build aarch64
        shell: bash
        run: |
          set +e
          {
            echo '=== claude_desktop listing ==='
            ls -la claude_desktop
            echo '=== symlinks ==='
            find claude_desktop -maxdepth 1 -type l -printf '%p -> %l\n'
            echo '=== template candidates ==='
            find .templates -maxdepth 1 -type f -printf '%f\n' | sort
          } >context.txt 2>&1

          BUILD_FROM="$(jq -r '.build_from.aarch64 // empty' '${{ steps.information.outputs.build }}')"
          docker buildx build \
            --platform linux/arm64 \
            --progress=plain \
            --build-arg "BUILD_FROM=${BUILD_FROM}" \
            --file claude_desktop/Dockerfile \
            claude_desktop >build.log 2>&1
          status=$?
          tail -n 300 build.log >build-tail.log
          printf 'build_status=%s\n' "$status" >build-status.txt
          exit 0

      - name: Upload diagnostic log
        uses: actions/upload-artifact@v4
        with:
          name: pr2841-aarch64-build-log
          path: |
            context.txt
            build-tail.log
            build-status.txt
          retention-days: 1
